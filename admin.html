<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sidequests</title>
<link rel="icon" href="icon.ico">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; gap: 0; }
  .tab { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 12px 0; margin-right: 2rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; white-space: nowrap; background: none; border-left: none; border-right: none; border-top: none; font-family: 'DM Mono', monospace; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* INBOX CARDS */
  .inbox-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s; }
  .inbox-card:hover { border-color: var(--border-hover); }
  .inbox-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .inbox-name { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
  .inbox-meta { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; }
  .inbox-desc { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 1rem; }
  .inbox-reason { font-size: 11px; color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 1rem; font-style: italic; }
  .inbox-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* USER CARDS */
  .user-row { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border); gap: 1rem; flex-wrap: wrap; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 14px; color: var(--text); margin-bottom: 3px; }
  .user-email { font-size: 11px; color: var(--muted); }
  .user-progress { font-size: 11px; color: var(--accent); white-space: nowrap; }

  /* QUEST MANAGEMENT */
  .quest-manage-row { display: flex; align-items: flex-start; gap: 1rem; padding: 1.25rem 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .quest-manage-body { flex: 1; min-width: 200px; }
  .quest-manage-name { font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .quest-manage-desc { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .quest-manage-actions { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }

  /* ADD QUEST FORM */
  .add-quest-form { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem; margin-bottom: 2rem; display: none; }
  .add-quest-form.open { display: block; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; max-width: 500px; width: 100%; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem; }

  .empty { padding: 3rem; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<div id="toast"></div>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">Side<em>quests</em></a>
    <div class="nav-links">
      <a class="nav-link" href="index.html">← Back to site</a>
      <span class="nav-link active">Admin Dashboard</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="flex-between mb-4">
    <div>
      <p class="page-eyebrow">Andrei's control panel</p>
      <h1 class="page-title">Admin <em>Dashboard</em></h1>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-box"><div class="stat-box-num" id="stat-users">—</div><div class="stat-box-label">Users</div></div>
    <div class="stat-box"><div class="stat-box-num" id="stat-quests">—</div><div class="stat-box-label">Active Quests</div></div>
    <div class="stat-box"><div class="stat-box-num" id="stat-pending">—</div><div class="stat-box-label">Pending Suggestions</div></div>
    <div class="stat-box"><div class="stat-box-num" id="stat-completions">—</div><div class="stat-box-label">Total Completions</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('inbox')">📬 Inbox <span id="inbox-badge"></span></button>
    <button class="tab" onclick="switchTab('quests')">📋 Quest List</button>
    <button class="tab" onclick="switchTab('users')">👥 Users</button>
  </div>

  <!-- INBOX TAB -->
  <div class="tab-panel active" id="panel-inbox">
    <div class="flex-between mb-3">
      <div class="section-title" style="border:none;margin:0">Pending Suggestions</div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-ghost btn-sm" onclick="filterInbox('pending')">Pending</button>
        <button class="btn btn-ghost btn-sm" onclick="filterInbox('approved')">Approved</button>
        <button class="btn btn-ghost btn-sm" onclick="filterInbox('rejected')">Rejected</button>
        <button class="btn btn-ghost btn-sm" onclick="filterInbox('all')">All</button>
      </div>
    </div>
    <div id="inbox-list"></div>
  </div>

  <!-- QUESTS TAB -->
  <div class="tab-panel" id="panel-quests">
    <div class="flex-between mb-3">
      <div class="section-title" style="border:none;margin:0">All Quests</div>
      <button class="btn btn-primary btn-sm" onclick="toggleAddForm()">+ Add Quest Manually</button>
    </div>

    <div class="add-quest-form" id="add-form">
      <div class="section-title">New Quest</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name (English) *</label>
          <input class="form-input" id="nf-name-en" type="text" placeholder="Quest name" />
        </div>
        <div class="form-group">
          <label class="form-label">Name (Romanian)</label>
          <input class="form-input" id="nf-name-ro" type="text" placeholder="Numele misiunii" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Description (English) *</label>
          <textarea class="form-input" id="nf-desc-en" rows="2" placeholder="Short description..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Description (Romanian)</label>
          <textarea class="form-input" id="nf-desc-ro" rows="2" placeholder="Descriere scurtă..."></textarea>
        </div>
      </div>
      <div class="form-group" style="max-width:200px">
        <label class="form-label">Tag / Category</label>
        <select class="form-input" id="nf-tag">
          <option value="wild">wild</option>
          <option value="adventure">adventure</option>
          <option value="creative">creative</option>
          <option value="food">food</option>
          <option value="chaos">chaos</option>
          <option value="sentimental">sentimental</option>
          <option value="chill">chill</option>
        </select>
      </div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-primary btn-sm" onclick="addQuestManually()">Add to List</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>

    <div id="quests-list"></div>
  </div>

  <!-- USERS TAB -->
  <div class="tab-panel" id="panel-users">
    <div class="section-title">All Users</div>
    <div id="users-list"></div>
  </div>
</div>

<!-- EDIT QUEST MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Edit Quest</div>
    <input type="hidden" id="edit-id" />
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Name (English)</label>
        <input class="form-input" id="edit-name-en" type="text" />
      </div>
      <div class="form-group">
        <label class="form-label">Name (Romanian)</label>
        <input class="form-input" id="edit-name-ro" type="text" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Description (English)</label>
        <textarea class="form-input" id="edit-desc-en" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Description (Romanian)</label>
        <textarea class="form-input" id="edit-desc-ro" rows="3"></textarea>
      </div>
    </div>
    <div class="form-group" style="max-width:200px">
      <label class="form-label">Tag</label>
      <select class="form-input" id="edit-tag">
        <option value="wild">wild</option>
        <option value="adventure">adventure</option>
        <option value="creative">creative</option>
        <option value="food">food</option>
        <option value="chaos">chaos</option>
        <option value="sentimental">sentimental</option>
        <option value="chill">chill</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let inboxFilter = 'pending';
let allSuggestions = [];
let allQuestsAdmin = [];
let allUsers = [];

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3500);
}

async function logout() { await sb.auth.signOut(); window.location.href = 'login.html'; }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

async function init() {
  const user = await requireAdmin();
  if (!user) return;
  await Promise.all([loadStats(), loadInbox(), loadQuests(), loadUsers()]);
}

async function loadStats() {
  const [{ count: uc }, { count: qc }, { count: pc }, { count: cc }] = await Promise.all([
    sb.from('profiles').select('*', { count: 'exact', head: true }),
    sb.from('quests').select('*', { count: 'exact', head: true }).eq('approved', true),
    sb.from('quest_suggestions').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
    sb.from('user_progress').select('*', { count: 'exact', head: true }).eq('completed', true),
  ]);
  document.getElementById('stat-users').textContent = uc ?? '—';
  document.getElementById('stat-quests').textContent = qc ?? '—';
  document.getElementById('stat-pending').textContent = pc ?? '—';
  document.getElementById('stat-completions').textContent = cc ?? '—';
  if (pc > 0) document.getElementById('inbox-badge').textContent = ` (${pc})`;
}

async function loadInbox() {
  const { data, error } = await sb.from('quest_suggestions').select('*').order('created_at', { ascending: false });
  if (error) return toast('Error loading inbox', 'error');
  allSuggestions = data || [];
  renderInbox();
}

function filterInbox(f) { inboxFilter = f; renderInbox(); }

function renderInbox() {
  const list = document.getElementById('inbox-list');
  const filtered = inboxFilter === 'all' ? allSuggestions : allSuggestions.filter(s => s.status === inboxFilter);
  if (!filtered.length) { list.innerHTML = `<div class="empty">No ${inboxFilter} suggestions.</div>`; return; }

  list.innerHTML = filtered.map(s => `
    <div class="inbox-card" id="suggestion-${esc(s.id)}">
      <div class="inbox-top">
        <div>
          <div class="inbox-name">${esc(s.name_en)}</div>
          ${s.name_ro ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(s.name_ro)}</div>` : ''}
          <div class="inbox-meta">by ${esc(s.submitted_by_name || s.submitted_by_email)} · ${new Date(s.created_at).toLocaleDateString()} · <span class="tag ${s.status==='pending'?'tag-yellow':s.status==='approved'?'tag-green':'tag-red'}">${esc(s.status)}</span></div>
        </div>
        <span class="tag">${esc(s.tag)}</span>
      </div>
      <div class="inbox-desc"><strong style="color:var(--text);font-size:11px">EN:</strong> ${esc(s.desc_en)}${s.desc_ro ? `<br><strong style="color:var(--text);font-size:11px">RO:</strong> ${esc(s.desc_ro)}` : ''}</div>
      <div class="inbox-reason">"${esc(s.reason)}"</div>
      ${s.status === 'pending' ? `
      <div class="inbox-actions">
        <button class="btn btn-success btn-sm" onclick="approveSuggestion('${esc(s.id)}')">✓ Approve &amp; Add</button>
        <button class="btn btn-danger btn-sm" onclick="rejectSuggestion('${esc(s.id)}')">✕ Reject</button>
      </div>` : `<div style="font-size:11px;color:var(--muted)">Already ${esc(s.status)}.</div>`}
    </div>
  `).join('');
}

async function approveSuggestion(id) {
  const s = allSuggestions.find(x => x.id === id);
  if (!s) return;

  // Insert into quests
  const { error: qErr } = await sb.from('quests').insert({
    name_en: s.name_en, name_ro: s.name_ro,
    desc_en: s.desc_en, desc_ro: s.desc_ro,
    tag: s.tag, approved: true,
    suggested_by: s.submitted_by
  });
  if (qErr) return toast('Error approving: ' + qErr.message, 'error');

  // Update suggestion status
  await sb.from('quest_suggestions').update({ status: 'approved' }).eq('id', id);
  toast('Quest approved and added to the list!', 'success');
  await Promise.all([loadInbox(), loadQuests(), loadStats()]);
}

async function rejectSuggestion(id) {
  await sb.from('quest_suggestions').update({ status: 'rejected' }).eq('id', id);
  toast('Suggestion rejected.', '');
  await Promise.all([loadInbox(), loadStats()]);
}

async function loadQuests() {
  const { data, error } = await sb.from('quests').select('*').order('created_at', { ascending: true });
  if (error) return;
  allQuestsAdmin = data || [];
  renderQuests();
}

function renderQuests() {
  const list = document.getElementById('quests-list');
  if (!allQuestsAdmin.length) { list.innerHTML = '<div class="empty">No quests yet. Add one above or approve a suggestion.</div>'; return; }
  list.innerHTML = allQuestsAdmin.map(q => `
    <div class="quest-manage-row">
      <div class="quest-manage-body">
        <div class="quest-manage-name">${esc(q.name_en)} ${q.name_ro ? `<span style="color:var(--muted);font-size:12px">/ ${esc(q.name_ro)}</span>` : ''}</div>
        <div class="quest-manage-desc">${esc(q.desc_en)}</div>
        <span class="tag" style="margin-top:6px">${esc(q.tag)}</span>
      </div>
      <div class="quest-manage-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${esc(q.id)}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteQuest('${esc(q.id)}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function toggleAddForm() {
  document.getElementById('add-form').classList.toggle('open');
}

async function addQuestManually() {
  const nameEn = document.getElementById('nf-name-en').value.trim();
  const nameRo = document.getElementById('nf-name-ro').value.trim();
  const descEn = document.getElementById('nf-desc-en').value.trim();
  const descRo = document.getElementById('nf-desc-ro').value.trim();
  const tag = document.getElementById('nf-tag').value;
  if (!nameEn || !descEn) return toast('English name and description are required.', 'error');

  const { error } = await sb.from('quests').insert({
    name_en: nameEn, name_ro: nameRo || null,
    desc_en: descEn, desc_ro: descRo || null,
    tag, approved: true
  });
  if (error) return toast('Error: ' + error.message, 'error');
  toast('Quest added!', 'success');
  document.getElementById('nf-name-en').value = '';
  document.getElementById('nf-name-ro').value = '';
  document.getElementById('nf-desc-en').value = '';
  document.getElementById('nf-desc-ro').value = '';
  toggleAddForm();
  await Promise.all([loadQuests(), loadStats()]);
}

async function deleteQuest(id) {
  if (!confirm('Delete this quest? This also removes all user progress for it.')) return;
  // Delete the quest first; if it fails, progress stays intact
  const { error } = await sb.from('quests').delete().eq('id', id);
  if (error) { toast('Error deleting quest: ' + error.message, 'error'); return; }
  // Quest gone — now clean up orphaned progress rows
  await sb.from('user_progress').delete().eq('quest_id', id);
  toast('Quest deleted.', '');
  await Promise.all([loadQuests(), loadStats()]);
}

function openEdit(id) {
  const q = allQuestsAdmin.find(x => x.id === id);
  if (!q) return;
  document.getElementById('edit-id').value = q.id;
  document.getElementById('edit-name-en').value = q.name_en || '';
  document.getElementById('edit-name-ro').value = q.name_ro || '';
  document.getElementById('edit-desc-en').value = q.desc_en || '';
  document.getElementById('edit-desc-ro').value = q.desc_ro || '';
  document.getElementById('edit-tag').value = q.tag || 'wild';
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const { error } = await sb.from('quests').update({
    name_en: document.getElementById('edit-name-en').value.trim(),
    name_ro: document.getElementById('edit-name-ro').value.trim() || null,
    desc_en: document.getElementById('edit-desc-en').value.trim(),
    desc_ro: document.getElementById('edit-desc-ro').value.trim() || null,
    tag: document.getElementById('edit-tag').value,
  }).eq('id', id);
  if (error) return toast('Save error: ' + error.message, 'error');
  toast('Quest updated!', 'success');
  closeModal();
  await loadQuests();
}

async function loadUsers() {
  const { data: profiles } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  const { data: progress } = await sb.from('user_progress').select('user_id').eq('completed', true);
  const countByUser = {};
  (progress || []).forEach(p => { countByUser[p.user_id] = (countByUser[p.user_id] || 0) + 1; });
  allUsers = (profiles || []).map(p => ({ ...p, completions: countByUser[p.id] || 0 }));
  renderUsers();
}

function renderUsers() {
  const list = document.getElementById('users-list');
  if (!allUsers.length) { list.innerHTML = '<div class="empty">No users yet.</div>'; return; }
  list.innerHTML = allUsers.map(u => `
    <div class="user-row">
      <div class="user-info">
        <div class="user-name">${esc(u.display_name) || '—'}</div>
        <div class="user-email">${esc(u.email)}</div>
      </div>
      <div class="user-progress">${u.completions} quests done</div>
      <button class="btn btn-ghost btn-sm" onclick="viewAsUser('${esc(u.id)}', '${esc(u.display_name||u.email)}', '${esc(u.email)}')">
        👁 View as
      </button>
    </div>
  `).join('');
}

function viewAsUser(id, name, email) {
  sessionStorage.setItem('viewAs', JSON.stringify({ id, display_name: name, email }));
  window.location.href = 'index.html';
}

// Close modal on overlay click
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
