<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Sidequests</title>
<link rel="icon" type="image/png" href="icon.ico">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .auth-box{width:100%;max-width:420px}
  .auth-logo{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:2.5rem}
  .auth-logo em{font-style:italic;color:var(--accent)}
  .auth-tagline{font-size:11px;color:var(--muted);margin-top:.4rem;letter-spacing:.05em}
  .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem}
  .auth-tab{font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:10px 0;margin-right:2rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;background:none;border-left:none;border-right:none;border-top:none;font-family:'DM Mono',monospace}
  .auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .auth-form{display:none}
  .auth-form.active{display:block}
  .auth-footer{margin-top:1.5rem;font-size:11px;color:var(--muted);text-align:center;line-height:1.7}
  .pass-wrap{position:relative}
  .pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;letter-spacing:.1em;font-family:'DM Mono',monospace;transition:color .2s}
  .pass-toggle:hover{color:var(--accent)}
  .pass-wrap .form-input{padding-right:56px}
  .strength-bar{height:2px;background:var(--border);margin-top:6px;border-radius:1px;overflow:hidden}
  .strength-fill{height:100%;width:0;transition:width .3s,background .3s;border-radius:1px}
  .strength-label{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.1em}
</style>
</head>
<body>
<div id="toast"></div>
<div class="auth-wrap">
  <div class="auth-box fade-up">
    <div class="auth-logo">
      Side<em>quests</em>
      <div class="auth-tagline">Summer 2025</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-wrap">
          <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pass-toggle" type="button" onclick="togglePass('login-pass',this)" tabindex="-1">Show</button>
        </div>
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;margin-top:.5rem" onclick="login(this)">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div class="auth-form" id="form-register">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="How the group knows you" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-wrap">
          <input class="form-input" type="password" id="reg-pass" placeholder="Min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button class="pass-toggle" type="button" onclick="togglePass('reg-pass',this)" tabindex="-1">Show</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <button class="btn btn-primary" id="reg-btn" style="width:100%;justify-content:center;margin-top:.5rem" onclick="register(this)">Create Account</button>
    </div>

    <div class="auth-footer">Part of the group? Ask Andrei for the link.</div>
  </div>
</div>

<script>
// Redirect if already logged in
(async()=>{ const u=await getUser(); if(u) window.location.href='index.html'; })();

function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',['login','register'][i]===tab));
  document.getElementById('form-login').classList.toggle('active',tab==='login');
  document.getElementById('form-register').classList.toggle('active',tab==='register');
}

function togglePass(inputId, btn){
  const el=document.getElementById(inputId);
  const show=el.type==='password';
  el.type=show?'text':'password';
  btn.textContent=show?'Hide':'Show';
}

function checkStrength(val){
  const fill=document.getElementById('strength-fill');
  const label=document.getElementById('strength-label');
  if(!val){fill.style.width='0';label.textContent='';return}
  let score=0;
  if(val.length>=6) score++;
  if(val.length>=10) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  const levels=[
    {w:'20%',c:'#e08080',t:'Weak'},
    {w:'40%',c:'#c8a06a',t:'Fair'},
    {w:'60%',c:'#c8b89a',t:'OK'},
    {w:'80%',c:'#7ab5a0',t:'Good'},
    {w:'100%',c:'#4a7c5f',t:'Strong'},
  ];
  const l=levels[Math.min(score,4)];
  fill.style.width=l.w; fill.style.background=l.c;
  label.textContent=l.t; label.style.color=l.c;
}

async function login(btn){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass) return toast('Fill in all fields.','error');
  await withLoading(btn, async()=>{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      if(error.message.includes('Invalid login')) return toast('Wrong email or password.','error');
      return toast(error.message,'error');
    }
    window.location.href='index.html';
  });
}

async function register(btn){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  if(!name||!email||!pass) return toast('Fill in all fields.','error');
  if(pass.length<6) return toast('Password must be at least 6 characters.','error');
  await withLoading(btn, async()=>{
    const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{display_name:name}}});
    if(error) return toast(error.message,'error');
    if(data.user){
      await sb.from('profiles').upsert({id:data.user.id,display_name:name,email});
    }
    toast('Account created! Signing you in…','success');
    setTimeout(()=>window.location.href='index.html',1500);
  });
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const loginActive=document.getElementById('form-login').classList.contains('active');
  if(loginActive){
    const btn=document.getElementById('login-btn');
    if(!btn.disabled) login(btn);
  } else {
    const btn=document.getElementById('reg-btn');
    if(!btn.disabled) register(btn);
  }
});
</script>
</body>
</html>
